<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06 内嵌编辑模式 - Algeo SDK</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
    }

    .page {
      margin: 0 auto;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0 0 8px;
    }

    .desc {
      color: #666;
      font-size: 0.875rem;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button.primary {
      background: #2563eb;
      color: white;
    }

    button.primary:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: white;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    button.secondary:hover {
      background: #f9fafb;
    }

    button.ghost {
      background: #111827;
      color: white;
    }

    button.ghost:hover {
      background: #1f2937;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(320px, 0.9fr);
      gap: 16px;
      align-items: stretch;
    }

    .embed-column,
    .side-column {
      min-width: 0;
    }

    .side-column {
      display: flex;
    }

    .controls {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      max-height: 600px;
      overflow: auto;
    }

    .controls h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .controls p {
      margin: 0 0 12px;
      color: #6b7280;
      font-size: 0.8125rem;
      line-height: 1.5;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
    }

    .control-card {
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
    }

    .control-card h3 {
      margin: 0 0 8px;
      font-size: 0.875rem;
    }

    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .button-group button {
      flex: 1 1 100%;
      min-width: 120px;
    }

    .logs {
      padding: 12px;
      border-radius: 8px;
      background: #111827;
      color: #e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.8125rem;
      min-height: 160px;
      max-height: 260px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
    }

    .embed-wrap {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      height: 600px;
      max-height: 600px;
      background: #fafafa;
    }

    .embed-wrap>div {
      width: 100%;
      height: 100%;
    }

    .panel {
      padding: 12px;
      border-radius: 8px;
      background: #f5f5f5;
      font-family: monospace;
      font-size: 0.8125rem;
      min-height: 96px;
      max-height: 180px;
      white-space: pre-wrap;
      word-break: break-all;
      overflow: auto;
    }

    .note {
      margin-top: 8px;
      color: #666;
      font-size: 0.8125rem;
    }

    a {
      color: #06c;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        max-height: none;
      }

      .embed-wrap {
        height: 360px;
        max-height: none;
      }

      .panel,
      .logs {
        max-height: none;
      }

    }
  </style>
</head>

<body>
  <div class="page">
    <a href="index.html">← 返回示例列表</a>
    <h1>06 内嵌编辑模式</h1>
    <p class="desc">页面加载后会自动创建一个 <code>appId = 123456</code> 的空白编辑器，并可直接测试 <code>setUiConfig</code> /
      <code>getUiConfig</code>。
    </p>

    <div class="stack">
      <div class="layout">
        <div class="embed-column">
          <div class="embed-wrap">
            <div id="algeo-container"></div>
          </div>
        </div>

        <div class="side-column">
          <section class="controls">
            <h2>UI 配置测试</h2>
            <p>每个模块使用一个 toggle 按钮；点击“读取当前配置”会调用 <code>editor.mode.getUiConfig()</code> 并同步按钮状态。</p>
            <div class="toolbar">
              <button class="secondary" id="readConfigBtn">读取当前配置</button>
              <button class="secondary" id="showAllBtn">全部显示</button>
              <button class="secondary" id="hideAllBtn">全部隐藏</button>
            </div>
            <div class="control-grid" id="controlGrid"></div>
          </section>
        </div>
      </div>

      <div class="panel" id="panel">等待创建...</div>

      <div class="logs" id="logs">等待操作...
      </div>
    </div>
  </div>

  <script src="../dist/algeo-sdk.umd.js"></script>
  <script>
    const container = document.getElementById('algeo-container');
    const panel = document.getElementById('panel');
    const logs = document.getElementById('logs');
    const controlGrid = document.getElementById('controlGrid');
    const readConfigBtn = document.getElementById('readConfigBtn');
    const showAllBtn = document.getElementById('showAllBtn');
    const hideAllBtn = document.getElementById('hideAllBtn');
    const baseUrl = 'http://localhost:8080';
    const appId = '123456';

    const uiFields = [
      { key: 'navbar', label: '顶部导航栏' },
      { key: 'slidePanel', label: '画板列表' },
      { key: 'toolboxPanel', label: '工具面板' },
      { key: 'algebraPanel', label: '代数面板' },
      { key: 'docPanel', label: '笔记面板' },
    ];

    let sdk = null;
    let currentUiConfig = null;

    function log(message, payload) {
      const lines = [
        new Date().toLocaleTimeString() + ' ' + message,
      ];
      if (payload !== undefined) {
        lines.push(JSON.stringify(payload, null, 2));
      }
      logs.textContent = lines.join('\n') + '\n\n' + logs.textContent;
    }

    function updatePanel(extra) {
      const iframe = container.querySelector('iframe');
      panel.textContent = [
        'mode: editor',
        'baseUrl: ' + baseUrl,
        'path: /embed/edit',
        'appId: ' + appId,
        'shareId: (empty)',
        'iframe src: ' + (iframe ? iframe.src : '(not created)'),
        extra || '',
      ].filter(Boolean).join('\n');
    }

    function updateToggleButtons(config) {
      currentUiConfig = config;
      controlGrid.querySelectorAll('button[data-key]').forEach((button) => {
        const key = button.getAttribute('data-key');
        if (!key) {
          return;
        }
        const visible = Boolean(config[key]);
        button.textContent = visible ? '隐藏' : '显示';
        button.className = visible ? 'ghost' : 'secondary';
      });
    }

    function ensureSdk() {
      if (!sdk) {
        throw new Error('请先创建 iframe');
      }
      return sdk;
    }

    async function readUiConfig() {
      const editor = ensureSdk();
      const config = editor.mode.getUiConfig();
      updateToggleButtons(config);
      updatePanel('ready: ' + editor.ready + ', version: ' + (editor.version || '-') + '\nui: ' + JSON.stringify(config));
      log('getUiConfig', config);
      return config;
    }

    async function setUiConfig(partialConfig, label) {
      const editor = ensureSdk();
      await editor.mode.setUiConfig(partialConfig);
      log('setUiConfig: ' + label, partialConfig);
      await readUiConfig();
    }

    function renderUiControls() {
      controlGrid.innerHTML = uiFields.map(({ key, label }) => `
        <div class="control-card">
          <h3>${label}</h3>
          <div class="button-group">
            <button class="secondary" data-key="${key}">切换</button>
          </div>
        </div>
      `).join('');

      controlGrid.querySelectorAll('button[data-key]').forEach((button) => {
        button.addEventListener('click', async () => {
          const key = button.getAttribute('data-key');
          if (!key) {
            return;
          }
          try {
            const config = currentUiConfig ?? await readUiConfig();
            const nextValue = !Boolean(config[key]);
            await setUiConfig({ [key]: nextValue }, key + '=' + nextValue);
          } catch (e) {
            log('setUiConfig 失败', { message: e.message || String(e), key });
          }
        });
      });
    }

    renderUiControls();

    readConfigBtn.onclick = async () => {
      try {
        await readUiConfig();
      } catch (e) {
        log('getUiConfig 失败', { message: e.message || String(e) });
      }
    };

    showAllBtn.onclick = async () => {
      try {
        await setUiConfig(Object.fromEntries(uiFields.map(({ key }) => [key, true])), 'showAll');
      } catch (e) {
        log('全部显示失败', { message: e.message || String(e) });
      }
    };

    hideAllBtn.onclick = async () => {
      try {
        await setUiConfig(Object.fromEntries(uiFields.map(({ key }) => [key, false])), 'hideAll');
      } catch (e) {
        log('全部隐藏失败', { message: e.message || String(e) });
      }
    };

    async function initializeEditor() {
      if (sdk) {
        sdk.destroy();
        sdk = null;
      }
      container.innerHTML = '';
      updatePanel('正在创建...');
      log('create', {
        mode: 'editor',
        baseUrl,
        appId,
        shareId: '',
      });

      try {
        sdk = await AlgeoSdk.create(container, {
          mode: 'editor',
          baseUrl,
          editor: {
            auth: {
              appId,
            },
          },
        });
        updatePanel('ready: ' + sdk.ready + ', version: ' + (sdk.version || '-'));
        log('create 成功', {
          ready: sdk.ready,
          version: sdk.version || '-',
        });
        await readUiConfig();
      } catch (e) {
        updatePanel('初始化未完成: ' + (e.message || String(e)));
        log('create 失败', { message: e.message || String(e) });
      }
    }

    void initializeEditor();
  </script>
</body>

</html>
