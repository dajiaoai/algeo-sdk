<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <title>Algeo SDK 示例</title>
  <style>
    * {
      box-sizing: border-box;

    body {

      margin: 0;
      padding: 24px;

    }

      margin: 0 0 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));

    }

    a h3 {

      font-size: 1rem;
    }

      color: #666;

<body>
  <h1>Algeo SDK 示例</h1>

  <div class="grid">
    <a href="01-basic-iframe.html">

</html>
