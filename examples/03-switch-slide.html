<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03 切换画板 - Algeo SDK</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0 0 8px;
    }

    .desc {
      color: #666;
      font-size: 0.875rem;
      margin-bottom: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 200px;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button.primary {
      background: #2563eb;
      color: white;
    }

    button.primary:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #e5e7eb;
      color: #374151;
    }

    button.secondary:hover {
      background: #d1d5db;
    }

    .slide-btn-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .embed-wrap {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      height: 400px;
      background: #fafafa;
    }

    .embed-wrap>div {
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .log {
      margin-top: 12px;
      font-size: 0.75rem;
      font-family: monospace;
      max-height: 100px;
      overflow: auto;
      background: #f5f5f5;
      padding: 8px;
      border-radius: 6px;
    }

    .log div {
      margin: 2px 0;
    }

    .log .recv {
      color: #0a0;
    }

    .log .send {
      color: #06c;
    }

    a {
      color: #06c;
    }
  </style>
</head>

<body>
  <a href="index.html">← 返回示例列表</a>
  <h1>03 切换画板</h1>
  <p class="desc">多画板内容，通过 switchSlide 切换。需分享 ID 对应多画板文件。</p>
  <div class="toolbar">
    <label>分享 ID</label>
    <input type="text" id="shareId" value="OOBY2DCZ" placeholder="输入分享 ID">
    <button class="primary" id="reload">加载</button>
    <span style="margin-left: 8px;">画板：</span>
    <div id="slideBtnList" class="slide-btn-list"></div>
  </div>
  <div class="embed-wrap">
    <div id="algeo-container"></div>
  </div>
  <div class="log" id="log"></div>

  <script src="../dist/algeo-sdk.umd.js"></script>
  <script>
    const logEl = document.getElementById('log');
    const shareIdEl = document.getElementById('shareId');
    const container = document.getElementById('algeo-container');
    const slideBtnListEl = document.getElementById('slideBtnList');

    let sdk = null;

    function log(type, msg) {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = new Date().toLocaleTimeString() + ' ' + (type === 'recv' ? '←' : '→') + ' ' + JSON.stringify(msg);
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function refreshSlideButtons() {
      if (!sdk) return;
      sdk.getSlideCount()
        .then((r) => {
          const count = r?.count ?? 0;
          renderSlideButtons(count);
        })
        .catch(() => renderSlideButtons(0));
    }

    function renderSlideButtons(count) {
      slideBtnListEl.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const btn = document.createElement('button');
        btn.className = 'secondary';
        btn.dataset.index = String(i);
        btn.textContent = '画板 ' + (i + 1);
        btn.onclick = () => {
          if (sdk) sdk.switchSlide(parseInt(btn.dataset.index, 10))
            .then(() => log('send', { type: 'switchSlide', index: parseInt(btn.dataset.index, 10) }))
            .catch((e) => log('recv', { error: e.message }));
        };
        slideBtnListEl.appendChild(btn);
      }
    }

    async function load() {
      const id = shareIdEl.value.trim() || '33TA3484';
      slideBtnListEl.innerHTML = '';

      try {
        if (!sdk) {
          sdk = await AlgeoSdk.AlgeoSdk.create(container, {
            baseUrl: 'https://dajiaoai.com',
            initialId: id,
          });
        } else {
          await sdk.loadShareById(id)
        }
        refreshSlideButtons();
      } catch (e) {
        renderSlideButtons(0);
      }
    }

    window.addEventListener('message', (e) => {
      const d = e.data;
      if (d?.type === 'ready' || d?.type === 'response') log('recv', d);
      if (d?.type === 'ready' && sdk) refreshSlideButtons();
    });

    document.getElementById('reload').onclick = load;
    load();
  </script>
</body>

</html>
