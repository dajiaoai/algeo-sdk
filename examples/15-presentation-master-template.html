<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 应用母版风格 - Algeo SDK</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #d6deea;
      --text: #18202f;
      --muted: #617086;
      --brand: #1168ea;
      --brand-strong: #0b4fc2;
      --danger: #b42318;
      --success: #067647;
      --shadow: 0 16px 40px rgba(24, 32, 47, 0.1);
    }

    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fbfdff, var(--bg));
    }

    a {
      color: var(--brand-strong);
    }

    code {
      font-family: Consolas, Monaco, monospace;
    }

    .page {
      display: grid;
      gap: 16px;
    }

    .hero {
      display: grid;
      gap: 8px;
    }

    .hero h1 {
      margin: 0;
      font-size: 1.75rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(380px, 0.95fr);
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .embed {
      overflow: hidden;
    }

    .embed-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg,
          rgba(17, 104, 234, 0.08),
          rgba(255, 255, 255, 0.94));
    }

    .load-form {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 650;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      background: #fff;
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      font:
        12px/1.55 Consolas,
        Monaco,
        monospace;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(17, 104, 234, 0.5);
      box-shadow: 0 0 0 3px rgba(17, 104, 234, 0.1);
    }

    #algeo-container {
      height: 680px;
      background: #fbfdff;
    }

    .sidebar {
      display: grid;
      gap: 16px;
    }

    .section {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .section h2 {
      margin: 0;
      font-size: 1rem;
    }

    .section p {
      margin: 0;
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        opacity 0.18s ease,
        box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #4b7ff8);
      box-shadow: 0 12px 26px rgba(17, 104, 234, 0.22);
    }

    .secondary {
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 4px;
      background: #edf2f8;
      border-radius: 999px;
    }

    .tab {
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
      box-shadow: none;
    }

    .tab.is-active {
      color: var(--brand-strong);
      background: #fff;
      box-shadow: 0 8px 18px rgba(24, 32, 47, 0.08);
    }

    .panel {
      display: none;
      gap: 12px;
    }

    .panel.is-active {
      display: grid;
    }

    .status {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(17, 104, 234, 0.08);
      border: 1px solid rgba(17, 104, 234, 0.18);
      color: var(--brand-strong);
      font-size: 0.875rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status.error {
      background: rgba(180, 35, 24, 0.08);
      border-color: rgba(180, 35, 24, 0.18);
      color: var(--danger);
    }

    .status.success {
      background: rgba(6, 118, 71, 0.08);
      border-color: rgba(6, 118, 71, 0.18);
      color: var(--success);
    }

    .templates {
      display: grid;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding-right: 2px;
    }

    .template-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      padding: 12px;
      text-align: left;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    .template-row.is-active {
      border-color: rgba(17, 104, 234, 0.5);
      box-shadow: 0 10px 22px rgba(17, 104, 234, 0.12);
    }

    .template-info {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .template-info strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.95rem;
    }

    .template-info span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .logs {
      min-height: 150px;
      max-height: 220px;
      padding: 14px;
      overflow: auto;
      color: #e5e7eb;
      background: #101828;
      border-radius: 14px;
      font:
        12px/1.6 Consolas,
        Monaco,
        monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 980px) {

      .layout,
      .embed-header,
      .load-form {
        grid-template-columns: 1fr;
      }

      #algeo-container {
        height: 420px;
      }

      .templates,
      .logs {
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <a href="index.html">← 返回示例列表</a>

    <section class="hero">
      <h1>15 应用母版风格</h1>
      <p>
        这个示例允许按 shareId
        创建演示实例，右侧内置公开的母版并可直接应用，也可以切换到手动输入母版
        JSON 字符串后应用。
      </p>
    </section>

    <div class="layout">
      <section class="card embed">
        <div class="embed-header">
          <div>
            <strong>Embedded Presentation</strong>
            <p style="margin: 4px 0 0; color: var(--muted); font-size: 0.84rem">
              当前示例调用
              <code>presentation.mode.setMasterTemplate(templateContent)</code>
            </p>
          </div>
          <form class="load-form" id="shareForm">
            <label>
              <input id="shareIdInput" type="text" autocomplete="off" />
            </label>
            <button class="primary" type="submit">加载 shareId</button>
          </form>
        </div>
        <div id="algeo-container"></div>
      </section>

      <div class="sidebar">
        <section class="card section">
          <h2>母版面板</h2>
          <div class="tabs" role="tablist" aria-label="母版应用方式">
            <button class="tab is-active" type="button" data-tab="system">
              示例母版
            </button>
            <button class="tab" type="button" data-tab="manual">
              手动填写
            </button>
          </div>

          <div class="status" id="status">等待初始化...</div>

          <div class="panel is-active" id="systemPanel">
            <p>示例内置公开母版数据，仅展示名称，点击“应用”后才会生效。</p>
            <p>
              你可以在大角几何编辑风格，并在
              <a id="masterTemplatesLink" href="#" target="_blank" rel="noopener">母版管理</a>
              页下载数据。
            </p>
            <div class="templates" id="templates"></div>
          </div>

          <div class="panel" id="manualPanel">
            <p>
              粘贴接口返回的
              <code>content</code>
              字符串内容，点击后应用到演示内容的全部画板。
            </p>
            <label>
              母版 JSON
              <textarea id="manualTemplateInput" spellcheck="false"
                placeholder='{"backgroundStyle": {...}, "defaultStyle": {...}}'></textarea>
            </label>
            <div class="button-row">
              <button class="primary" id="applyManualBtn" type="button">
                应用手动母版
              </button>
              <button class="secondary" id="clearManualBtn" type="button">
                清空
              </button>
            </div>
          </div>
        </section>

        <section class="card section">
          <h2>日志</h2>
          <div class="logs" id="logs">等待操作...</div>
        </section>
      </div>
    </div>
  </div>

  <script src="../dist/algeo-sdk.umd.js"></script>
  <script src="./assets/js/config.js"></script>
  <script>
    const {
      baseUrl: BASE_URL,
      appId: APP_ID,
      shareId: DEFAULT_SHARE_ID,
    } = window.ALGEO_CONFIG;
    const BUILTIN_TEMPLATES = [
      {
        name: '黑白试题风格',
        content: `{
  "backgroundStyle": {
    "background": {
      "color": "#ffffff"
    },
    "grid": {},
    "xaxis": {},
    "yaxis": {}
  },
  "defaultStyle": {
    "types": [
      [
        "Point",
        {
          "pointSize": 1,
          "color": "#000000"
        }
      ],
      [
        "Segment",
        {
          "color": "#000000",
          "lineOpacity": 100
        }
      ],
      [
        "Line",
        {
          "color": "#000000",
          "lineOpacity": 100
        }
      ],
      [
        "Ray",
        {
          "lineOpacity": 100,
          "color": "#000000"
        }
      ],
      [
        "Circle",
        {
          "color": "#000000",
          "lineOpacity": 100
        }
      ],
      [
        "Ellipse",
        {
          "lineOpacity": 100,
          "color": "#000000"
        }
      ],
      [
        "Arc",
        {
          "lineOpacity": 100,
          "color": "#000000"
        }
      ],
      [
        "Angle",
        {
          "color": "#000000",
          "regionOpacity": 0,
          "angleSize": 10
        }
      ],
      [
        "Polygon",
        {
          "color": "#ffffff",
          "lineWidth": 2,
          "lineDash": "solid",
          "lineOpacity": 100,
          "regionOpacity": 1
        }
      ],
      [
        "Curve",
        {
          "lineOpacity": 100,
          "color": "#000000"
        }
      ]
    ],
    "typeLabels": [],
    "textType": {},
    "sliderType": {},
    "buttonType": {}
  },
  "previewPngUrl": "https://dl.easeplay.vip/algeo/68550f5b84833f05f53dbe10/7962c70d-master_preview_20260617_122743.png",
  "metadata": {
    "exportedAt": "2026-06-17T04:27:43.779Z",
    "version": "1"
  }
}`,
      },
      {
        name: '网格作图',
        content: `{
  "backgroundStyle": {
    "background": {},
    "grid": {
      "show": true,
      "capturingMode": "grid",
      "distanceMode": "auto",
      "locking": false
    },
    "xaxis": {},
    "yaxis": {}
  },
  "defaultStyle": {
    "types": [],
    "typeLabels": [],
    "textType": {}
  },
  "previewPngUrl": "https://dl.easeplay.vip/algeo/68550f5b84833f05f53dbe10/3f25eaba-master_preview_20260318_145746.png",
  "metadata": {
    "exportedAt": "2026-03-18T06:57:46.623Z",
    "version": "1"
  }
}`,
      },
    ];

    const container = document.getElementById('algeo-container');
    const statusEl = document.getElementById('status');
    const logsEl = document.getElementById('logs');
    const shareForm = document.getElementById('shareForm');
    const shareIdInput = document.getElementById('shareIdInput');
    const tabs = Array.from(document.querySelectorAll('[data-tab]'));
    const systemPanel = document.getElementById('systemPanel');
    const manualPanel = document.getElementById('manualPanel');
    const templatesEl = document.getElementById('templates');
    const masterTemplatesLink = document.getElementById(
      'masterTemplatesLink',
    );
    const manualTemplateInput = document.getElementById(
      'manualTemplateInput',
    );
    const applyManualBtn = document.getElementById('applyManualBtn');
    const clearManualBtn = document.getElementById('clearManualBtn');

    let presentation = null;
    let templates = BUILTIN_TEMPLATES;
    let activeTemplateIndex = -1;
    let currentShareId = DEFAULT_SHARE_ID;

    shareIdInput.value = DEFAULT_SHARE_ID;
    masterTemplatesLink.href =
      BASE_URL.replace(/\/$/, '') + '/master-templates';

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', type === 'error');
      statusEl.classList.toggle('success', type === 'success');
    }

    function log(message) {
      const ts = new Date().toLocaleTimeString();
      logsEl.textContent =
        '[' + ts + '] ' + message + '\n' + logsEl.textContent;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setActiveTab(tabName) {
      tabs.forEach((tab) => {
        tab.classList.toggle('is-active', tab.dataset.tab === tabName);
      });
      systemPanel.classList.toggle('is-active', tabName === 'system');
      manualPanel.classList.toggle('is-active', tabName === 'manual');
    }

    function renderTemplates() {
      if (!templates.length) {
        templatesEl.innerHTML = '<div class="status">暂无示例母版</div>';
        return;
      }

      templatesEl.innerHTML = templates
        .map((template, index) => {
          const name = template.name || '未命名母版';
          const activeClass =
            index === activeTemplateIndex ? ' is-active' : '';

          return (
            '<div class="template-row' +
            activeClass +
            '">' +
            '<span class="template-info">' +
            '<strong>' +
            escapeHtml(name) +
            '</strong>' +
            '</span>' +
            '<button class="primary" type="button" data-template-index="' +
            index +
            '">应用</button>' +
            '</div>'
          );
        })
        .join('');
    }

    async function createPresentationInstance(shareId) {
      if (presentation && typeof presentation.destroy === 'function') {
        await presentation.destroy();
      }

      container.innerHTML = '';
      presentation = null;
      activeTemplateIndex = -1;
      renderTemplates();
      setStatus('正在创建演示实例...');

      presentation = await AlgeoSdk.create(container, {
        mode: 'presentation',
        baseUrl: BASE_URL,
        presentation: {
          appId: APP_ID,
          shareId,
        },
      });

      currentShareId = shareId;
      setStatus('演示实例已就绪，当前 shareId：' + shareId, 'success');
      log('演示实例初始化完成，shareId=' + shareId);
    }

    async function applyTemplateContent(templateContent, label) {
      if (!presentation) {
        setStatus('演示实例尚未初始化', 'error');
        return;
      }

      if (typeof templateContent !== 'string' || !templateContent.trim()) {
        setStatus('母版内容不能为空', 'error');
        return;
      }

      try {
        JSON.parse(templateContent);
      } catch {
        setStatus('母版内容不是合法 JSON 字符串', 'error');
        return;
      }

      setStatus('正在应用母版：' + label);

      try {
        await presentation.mode.setMasterTemplate(templateContent);
        setStatus('母版已应用到所有画板：' + label, 'success');
        log('已应用母版：' + label + '，shareId=' + currentShareId);
      } catch (error) {
        const message =
          error instanceof Error ? error.message : String(error);
        setStatus('应用母版失败：' + message, 'error');
        log('应用母版失败：' + message);
      }
    }

    async function applySystemTemplate(index) {
      const template = templates[index];
      if (!template) {
        setStatus('未找到指定母版', 'error');
        return;
      }

      await applyTemplateContent(
        template.content,
        template.name || '未命名母版',
      );
      activeTemplateIndex = index;
      renderTemplates();
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => setActiveTab(tab.dataset.tab));
    });

    shareForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const shareId = shareIdInput.value.trim();
      if (!shareId) {
        setStatus('请输入 shareId', 'error');
        return;
      }

      createPresentationInstance(shareId).catch((error) => {
        const message =
          error instanceof Error ? error.message : String(error);
        presentation = null;
        setStatus('加载 shareId 失败：' + message, 'error');
        log('加载 shareId 失败：' + message);
      });
    });

    templatesEl.addEventListener('click', (event) => {
      const button = event.target.closest('[data-template-index]');
      if (!button) return;
      void applySystemTemplate(
        Number(button.getAttribute('data-template-index')),
      );
    });

    applyManualBtn.addEventListener('click', () => {
      activeTemplateIndex = -1;
      renderTemplates();
      void applyTemplateContent(manualTemplateInput.value, '手动母版');
    });

    clearManualBtn.addEventListener('click', () => {
      manualTemplateInput.value = '';
      setStatus('已清空手动母版输入');
    });

    renderTemplates();
    createPresentationInstance(DEFAULT_SHARE_ID).catch((error) => {
      const message = error instanceof Error ? error.message : String(error);
      setStatus(message, 'error');
      log('初始化失败：' + message);
    });
  </script>
</body>

</html>
