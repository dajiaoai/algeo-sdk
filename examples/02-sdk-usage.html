<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02 SDK 方式 - Algeo SDK</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 16px;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0 0 8px;
    }

    .desc {
      color: #666;
      font-size: 0.875rem;
      margin-bottom: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 200px;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button.primary {
      background: #2563eb;
      color: white;
    }

    button.primary:hover {
      background: #1d4ed8;
    }

    button.danger {
      background: #dc2626;
      color: white;
    }

    button.danger:hover {
      background: #b91c1c;
    }

    .embed-wrap {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      height: 400px;
      background: #fafafa;
    }

    .embed-wrap>div {
      width: 100%;
      height: 100%;
    }

    .log {
      margin-top: 12px;
      font-size: 0.75rem;
      font-family: monospace;
      max-height: 100px;
      overflow: auto;
      background: #f5f5f5;
      padding: 8px;
      border-radius: 6px;
    }

    .log div {
      margin: 2px 0;
    }

    .status {
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 8px;
    }

    a {
      color: #06c;
    }
  </style>
</head>

<body>
  <a href="index.html">← 返回示例列表</a>
  <h1>02 SDK 方式</h1>
  <p class="desc">使用 AlgeoSdk 封装 iframe 与 postMessage，通过 Promise 调用 loadShareById。</p>
  <div class="status" id="status"></div>
  <div class="toolbar" id="createToolbar">
    <label>分享 ID</label>
    <input type="text" id="shareId" value="E8NHN7OP" placeholder="输入分享 ID">
    <button class="primary" id="createBtn">创建</button>
  </div>
  <div class="toolbar" id="sdkToolbar" style="display: none;">
    <button class="danger" id="destroyBtn">销毁</button>
  </div>
  <div class="embed-wrap" id="embedWrap" style="display: none;">
    <div id="algeo-container"></div>
  </div>
  <div class="log" id="log"></div>

  <script src="../dist/algeo-sdk.umd.js"></script>
  <script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const shareIdEl = document.getElementById('shareId');
    const container = document.getElementById('algeo-container');
    const createToolbar = document.getElementById('createToolbar');
    const sdkToolbar = document.getElementById('sdkToolbar');
    const embedWrap = document.getElementById('embedWrap');

    function log(msg) {
      const div = document.createElement('div');
      div.textContent = new Date().toLocaleTimeString() + ' ' + msg;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function showCreate() {
      createToolbar.style.display = 'flex';
      sdkToolbar.style.display = 'none';
      embedWrap.style.display = 'none';
      statusEl.textContent = '';
    }

    function showSdk() {
      createToolbar.style.display = 'none';
      sdkToolbar.style.display = 'flex';
      embedWrap.style.display = 'block';
    }

    let sdk = null;

    document.getElementById('createBtn').onclick = async () => {
      const id = shareIdEl.value.trim() || 'E8NHN7OP';
      try {
        sdk = new AlgeoSdk.AlgeoSdk(container, {
          baseUrl: 'https://dajiaoai.com',
          initialId: id,
        });
        statusEl.textContent = 'SDK 已初始化，ready: ' + sdk.ready + ', version: ' + (sdk.version || '-');
        log('SDK 初始化完成，initialId: ' + id);
        showSdk();
      } catch (e) {
        statusEl.textContent = '创建失败: ' + e.message;
        log('错误: ' + e.message);
      }
    };

    document.getElementById('destroyBtn').onclick = () => {
      if (sdk) {
        sdk.destroy();
        sdk = null;
        statusEl.textContent = 'SDK 已销毁';
        log('SDK 已销毁');
        showCreate();
      }
    };
  </script>
</body>

</html>
