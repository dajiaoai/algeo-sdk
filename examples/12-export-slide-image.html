<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12 导出画板图片 - Algeo SDK</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #d6deea;
      --text: #18202f;
      --muted: #617086;
      --brand: #1168ea;
      --brand-strong: #0b4fc2;
      --danger: #b42318;
      --shadow: 0 16px 40px rgba(24, 32, 47, 0.1);
    }

    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fbfdff, var(--bg));
    }

    a {
      color: var(--brand-strong);
    }

    code {
      font-family: Consolas, Monaco, monospace;
    }

    .page {
      display: grid;
      gap: 16px;
    }

    .hero {
      display: grid;
      gap: 8px;
    }

    .hero h1 {
      margin: 0;
      font-size: 1.75rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(340px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .embed {
      overflow: hidden;
    }

    .embed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(17, 104, 234, 0.08), rgba(255, 255, 255, 0.94));
    }

    #algeo-container {
      height: 680px;
      background: #fbfdff;
    }

    .sidebar {
      display: grid;
      gap: 16px;
    }

    .section {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .section h2 {
      margin: 0;
      font-size: 1rem;
    }

    .section p {
      margin: 0;
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .field-grid {
      display: grid;
      gap: 10px;
    }

    .field-grid label {
      display: grid;
      gap: 6px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #4b7ff8);
      box-shadow: 0 12px 26px rgba(17, 104, 234, 0.22);
    }

    .secondary {
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line);
    }

    .status {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(17, 104, 234, 0.08);
      border: 1px solid rgba(17, 104, 234, 0.18);
      color: var(--brand-strong);
      font-size: 0.875rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status.error {
      background: rgba(180, 35, 24, 0.08);
      border-color: rgba(180, 35, 24, 0.18);
      color: var(--danger);
    }

    .logs,
    .panel {
      padding: 14px;
      border-radius: 14px;
      font: 12px/1.6 Consolas, Monaco, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
    }

    .logs {
      min-height: 180px;
      max-height: 260px;
      background: #101828;
      color: #e5e7eb;
    }

    .panel {
      min-height: 120px;
      max-height: 220px;
      background: #f8fafc;
      border: 1px solid var(--line);
      color: #1f2937;
    }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      #algeo-container {
        height: 420px;
      }

      .logs,
      .panel {
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <a href="index.html">← 返回示例列表</a>

    <section class="hero">
      <h1>12 导出画板图片</h1>
      <p>这个示例使用多画板文件 <code>BW4DOLOT</code> 创建编辑器，演示 <code>editor.slides.exportImage()</code> 默认导出全部画板，以及按索引导出指定画板图片、SVG 或 LaTeX 内容。</p>
    </section>

    <div class="layout">
      <section class="card embed">
        <div class="embed-header">
          <div>
            <strong>Embedded Editor</strong>
          </div>
          <button class="secondary" id="reloadBtn">重建编辑器</button>
        </div>
        <div id="algeo-container"></div>
      </section>

      <div class="sidebar">
        <section class="card section">
          <h2>导出参数</h2>
          <p>不填写“导出画板索引”时，SDK 会默认导出全部画板。填写后按 1-based 索引导出指定画板，多个索引用英文逗号分隔。</p>
          <div class="field-grid">
            <label>导出画板索引
              <input id="slideIndicesInput" placeholder="例如：1,3">
            </label>
            <label>格式
              <select id="formatSelect">
                <option value="png">png</option>
                <option value="jpg">jpg</option>
                <option value="svg">svg</option>
                <option value="latex">latex</option>
              </select>
            </label>
            <label>宽度
              <input id="widthInput" type="number" min="1" step="1" value="1200">
            </label>
            <label>高度
              <input id="heightInput" type="number" min="1" step="1" value="900">
            </label>
            <label>质量（0~1，仅 jpg 生效）
              <input id="qualityInput" type="number" min="0" max="1" step="0.01" value="0.92">
            </label>
          </div>
          <div class="button-row">
            <button class="primary" id="exportBtn">导出图片</button>
            <button class="secondary" id="downloadAllBtn">下载最近一次结果</button>
          </div>
          <div class="hint">返回结果为导出内容数组，每个元素包含 <code>index</code> 和 <code>blob</code>；<code>latex</code> 内容可保存为 <code>.tex</code>。</div>
        </section>

        <section class="card section">
          <h2>导出结果</h2>
          <div class="status" id="status">等待初始化...</div>
          <div class="panel" id="resultPanel">尚未导出</div>
        </section>

        <section class="card section">
          <h2>日志</h2>
          <div class="logs" id="logs">等待操作...</div>
        </section>
      </div>
    </div>
  </div>

  <script src="../dist/algeo-sdk.umd.js"></script>
  <script src="./assets/js/config.js"></script>
  <script>
    const { baseUrl: BASE_URL, appId: APP_ID } = window.ALGEO_CONFIG;
    const SHARE_ID = 'BW4DOLOT';

    const container = document.getElementById('algeo-container');
    const statusEl = document.getElementById('status');
    const logsEl = document.getElementById('logs');
    const resultPanelEl = document.getElementById('resultPanel');
    const exportBtn = document.getElementById('exportBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const slideIndicesInput = document.getElementById('slideIndicesInput');
    const formatSelect = document.getElementById('formatSelect');
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const qualityInput = document.getElementById('qualityInput');

    let editor = null;
    let latestImages = [];

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', isError);
    }

    function setActionButtonsDisabled(disabled) {
      exportBtn.disabled = disabled;
      downloadAllBtn.disabled = disabled || latestImages.length === 0;
    }

    function log(message) {
      const ts = new Date().toLocaleTimeString();
      logsEl.textContent = '[' + ts + '] ' + message + '\n' + logsEl.textContent;
    }

    function parseSlideIndices(value) {
      const trimmed = value.trim();
      if (!trimmed) {
        return undefined;
      }

      const indices = trimmed
        .split(',')
        .map((part) => Number(part.trim()))
        .filter((value) => Number.isInteger(value) && value > 0);

      return indices.length > 0 ? Array.from(new Set(indices)) : [];
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = fileName;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function getDownloadExtension(format) {
      return format === 'latex' ? 'tex' : format;
    }

    function renderExportResult(images) {
      if (!images.length) {
        resultPanelEl.textContent = '没有导出的图片结果';
        return;
      }

      const summary = images.map((image) => {
        return JSON.stringify({
          index: image.index,
          format: image.format,
          width: image.width,
          height: image.height,
          size: image.blob.size,
          type: image.blob.type,
        }, null, 2);
      }).join('\n\n');

      resultPanelEl.textContent = summary;
    }

    async function createEditorInstance() {
      if (editor && typeof editor.destroy === 'function') {
        await editor.destroy();
      }

      container.innerHTML = '';
      editor = null;
      latestImages = [];
      renderExportResult([]);
      setActionButtonsDisabled(true);
      setStatus('正在创建编辑器...');

      editor = await AlgeoSdk.create(container, {
        mode: 'editor',
        baseUrl: BASE_URL,
        editor: {
          auth: { appId: APP_ID },
          shareId: SHARE_ID,
        },
      });

      setActionButtonsDisabled(false);
      setStatus('编辑器已就绪，可直接导出画板图片');
      log('编辑器初始化完成，shareId=' + SHARE_ID);
    }

    async function exportImages() {
      if (!editor) {
        setStatus('编辑器尚未初始化', true);
        log('导出失败：编辑器尚未初始化');
        return;
      }

      exportBtn.disabled = true;
      setStatus('正在导出图片...');

      try {
        const slideIndices = parseSlideIndices(slideIndicesInput.value);
        if (slideIndices && slideIndices.length === 0) {
          throw new Error('画板索引格式无效，请输入正整数并使用英文逗号分隔');
        }

        const options = {
          slideIndices,
          format: formatSelect.value,
          width: Number(widthInput.value),
          height: Number(heightInput.value),
          quality: Number(qualityInput.value),
        };

        latestImages = await editor.slides.exportImage(options);
        renderExportResult(latestImages);
        setActionButtonsDisabled(false);

        const target = slideIndices && slideIndices.length > 0
          ? '指定画板 ' + slideIndices.join(', ')
          : '全部画板';
        setStatus('导出成功，共返回 ' + latestImages.length + ' 张图片');
        log('导出完成，目标=' + target + '，返回=' + latestImages.length + ' 张');
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        setStatus(message, true);
        log('导出失败：' + message);
      } finally {
        exportBtn.disabled = false;
        downloadAllBtn.disabled = latestImages.length === 0;
      }
    }

    function downloadLatestImages() {
      if (!latestImages.length) {
        setStatus('暂无导出结果可下载', true);
        return;
      }

      for (const image of latestImages) {
        downloadBlob(image.blob, 'slide-' + image.index + '.' + getDownloadExtension(image.format));
      }

      setStatus('已触发 ' + latestImages.length + ' 个文件下载');
      log('下载最近一次导出结果，共 ' + latestImages.length + ' 张');
    }

    reloadBtn.addEventListener('click', () => {
      createEditorInstance().catch((error) => {
        const message = error instanceof Error ? error.message : String(error);
        editor = null;
        setActionButtonsDisabled(true);
        setStatus(message, true);
        log('重建编辑器失败：' + message);
      });
    });
    exportBtn.addEventListener('click', () => { void exportImages(); });
    downloadAllBtn.addEventListener('click', downloadLatestImages);

    createEditorInstance().catch((error) => {
      const message = error instanceof Error ? error.message : String(error);
      editor = null;
      setActionButtonsDisabled(true);
      setStatus(message, true);
      log('初始化失败：' + message);
    });
  </script>
</body>

</html>
